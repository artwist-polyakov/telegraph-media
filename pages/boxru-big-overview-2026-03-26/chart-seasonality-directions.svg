<text x="74.0" y="204.0" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="500" fill="#65717d" text-anchor="start">Wordstat, а не продажи по SKU, зато он хорошо показывает форму сезона.</text>
