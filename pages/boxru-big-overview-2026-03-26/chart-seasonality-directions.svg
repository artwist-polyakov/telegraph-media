<text x="74.0" y="132.0" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700" fill="#17212b" text-anchor="start">Q4 усиливает подарочные категории, март живёт ниже среднего почти везде</text>
